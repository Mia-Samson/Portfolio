<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mia Samson Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
</head>
<body class="login-body">

    <div class="login-container glass reveal active">
        <div class="login-header">
            <h2 class="playfair">Welcome Back</h2>
            <p>Access your professional portfolio.</p>
        </div>

        <form id="login-form" novalidate>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="name@example.com">
                <span class="error-msg" id="email-error"></span>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" class="form-control" placeholder="Enter your password">
                    <button type="button" id="toggle-password" class="toggle-password">Show</button>
                </div>
                <span class="error-msg" id="password-error"></span>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Login</button>
            <div id="login-success-msg" class="success-msg">Login successful! Redirecting...</div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
